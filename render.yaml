services:
  - type: web
    name: rag-policy-assistant
    env: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2', cache_folder='model_cache')" &&
      python -m src.indexing.ingest
    startCommand: gunicorn --bind 0.0.0.0:10000 --timeout 600 wsgi:app
    autoDeploy: true
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/src/model_cache